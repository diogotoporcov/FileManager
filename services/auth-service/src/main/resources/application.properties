server.port=${SERVER_PORT:8080}

spring.application.name=auth-service

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/authdb}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false

spring.rabbitmq.host=${RABBIT_HOST:localhost}
spring.rabbitmq.port=${RABBIT_PORT:5672}
spring.rabbitmq.username=${RABBIT_USER}
spring.rabbitmq.password=${RABBIT_PASSWORD}

management.endpoints.web.exposure.include=health,info

security.jwt.issuer=${JWT_ISSUER:auth-service}
security.jwt.audience=${JWT_AUDIENCE:file-manager}
security.jwt.secret=${JWT_SECRET}
security.jwt.access-token-ttl=${JWT_ACCESS_TTL:PT15M}
security.jwt.refresh-token-ttl=${JWT_REFRESH_TTL:P30D}

